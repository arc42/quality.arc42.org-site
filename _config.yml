#
# URL settings
#
# these need to be adjusted depending on target platform,

# "real" deployment with github-pages but custom domain
# -----------------------------------------------------
url: https://quality.arc42.org
imageurl: https://quality.arc42.org
baseurl:

#######################################################

#
# basic settings
#
title: arc42 Quality Model
description: quality characteristics, explained.
avatar: /assets/img/arc42logosquare.webp
favicon: /assets/img/arc42logosquare.webp
language: en
repository: arc42/quality.arc42.org-site

#
# Icons and Social-Media accounts
#
icons:
  rss: false
  email:
  github: arc42
  
#
# Prettify url.
#
permalink: pretty

#
# Localizations.
#
str_next: Next
str_prev: Prev
str_read_more: Read more...
str_search: Search
str_recent_posts: Recent answers
str_show_all_posts: Show all...

#
# Plugins.
#
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jemoji
  - jekyll-paginate
  - jekyll-github-metadata

#
# tags, collections etc -
# see https://jekyllrb.com/docs/collections/

collections:
  posts:
    hide: true

  articles:
    output: true
    hide: true

## qualities are the attributes/properties, like efficiency, flexibility etc
  qualities:
    output: true
    hide: true   
    sort_by: title

## (quality) requirements to describe and capture specific qualities
  requirements:
    output: true
    hide: true
    sort_by: title

## quality standards like iso25010, misra
  standards:
    output: true
    hide: true

## solution approaches (architectural tactics and patterns)
  approaches:
    output: true
    hide: true

#
# with this default, all files under /_qualities, _requirements etc
# get their respective layout per default, saving a bit of typing
#
defaults:
  - scope:
      type: "qualities"
    values:
      layout: qualities
      hide: "true"
  - scope:
      type: "requirements"
    values:
      layout: requirements
      hide: "true"
  - scope:
      type: "standards"
    values:
      layout: standards
      hide: "true"
  - scope:
      type: "approaches"
    values:
      layout: approach
      hide: "true"

#
# !! Danger zone !!
#

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

excerpt_separator: <!--more-->

sass:
  sass_dir: _sass
  style: :compressed # or :expanded

include:
  - _pages
  - _data/standard_tags.yaml

exclude:
  - "*.drawio"
  - "*.graffle"
  - "*.code-workspace"
  - Dockerfile
  - Makefile
  - Gemfile
  - Gemfile.lock
  - .dockerignore
  - .gitignore
  - .gitmodules
  - .impeccable.md
  - LICENSE
  - README.md
  - AGENTS.md
  - ACCESSIBILITY.md
  - PRODUCT.md
  - .agents
  - .claude
  - .junie
  - .deciduous
  - .bundle
  - _docker/
  - CRUSH/
  - docs/*
  - docs/index.html
  - .vscode
  - docker-compose.yml
  - _manage*
  - .sass-cache
  - _scripts/
  - vendor/
  - node_modules
  - playwright-report
  - test-results
  - package.json
  - package-lock.json
  - src/scripts/build.js
  - src/
  - TODO/
  - .prettierrc
  - CLAUDE.md
  - cheat-sheet.*
  - statistic-utilities/
  

watch_exclude:
  - .agents
  - .claude
  - .junie
  - .deciduous
  - .bundle
  - playwright-report
  - test-results
  - node_modules
  - .jekyll-cache
  - .sass-cache
  - _site
  - assets/js/fullpage # handled by esbuild
  - assets/js/homepage # handled by esbuild

incremental: true
