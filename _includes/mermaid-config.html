<script type="text/javascript">
/**
 * Lazy-load mermaid.js only if mermaid diagrams are present.
 */
(function() {
    const mermaidDivs = document.querySelectorAll('.mermaid, .language-mermaid');
    if (mermaidDivs.length > 0) {
        const script = document.createElement('script');
        script.src = "{{ '/assets/js/mermaid.js' | prepend: site.baseurl }}";
        script.async = true;
        script.onload = function() {
            const config = {
                theme: 'base',
                securityLevel: 'antiscript',
                startOnLoad: true,
                flowchart: {
                    useMaxWidth: true,
                    htmlLabels: true,
                    rankSpacing: 100,
                    nodeSpacing: 10
                },
                themeVariables: {
                    primaryColor: '#00B8F5',
                    primaryTextColor: '#FFFFFF',
                    primaryBorderColor: '#808080',
                    lineColor: '#d3d3d3'
                }
            };
            mermaid.initialize(config);
        };
        document.body.appendChild(script);
    }
})();
</script>
