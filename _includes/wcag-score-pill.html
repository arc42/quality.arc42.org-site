<span
    class="wcag-score-pill"
    data-wcag-score-container
    data-wcag-score-url="{{ '/assets/reports/wcag/latest.json' | prepend: site.baseurl }}">
    <a href="{{ '/about/wcag-report/' | prepend: site.baseurl }}" aria-label="Open WCAG accessibility report">
        <span class="wcag-score-dot" aria-hidden="true"></span>
        <img
            class="wcag-score-badge"
            data-wcag-score-badge
            src="https://img.shields.io/badge/WCAG-n%2Fa-lightgrey?style=social"
            alt="WCAG n/a">
    </a>
</span>
