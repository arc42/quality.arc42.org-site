<!-- Q42 Masthead — Sketch F dark sticky header with mega-menu -->
<header class="q42-masthead">
  <a class="q42-masthead__logo" href="{{ '/' | prepend: site.baseurl }}" aria-label="Q42 Home">
    <img src="{{ site.avatar | prepend: site.baseurl }}" alt="arc42 Quality Model">
  </a>

  <nav class="q42-masthead__nav" aria-label="Primary navigation">
    {% for link in site.data.navigation.main %}
      <a href="{{ link.url | prepend: site.baseurl }}"{% if page.url == link.url %} class="active"{% endif %}>
        {{ link.title }}
      </a>
    {% endfor %}

    {% include q42/mega-menu.html %}

    <a class="q42-nav-graph" href="{{ '/full-quality-graph' | prepend: site.baseurl }}" aria-label="Open full quality graph">
      <i class="fa fa-circle-nodes"></i> Graph
    </a>
  </nav>

  <form class="q42-masthead__search" action="{{ '/search/' | prepend: site.baseurl }}" method="get" role="search" aria-label="Search qualities">
    <i class="fa fa-search" aria-hidden="true"></i>
    <input type="search" id="q42-search-input" name="q" placeholder="Search…" autocomplete="off" aria-label="Search qualities">
    <kbd aria-hidden="true">/</kbd>
  </form>
</header>
