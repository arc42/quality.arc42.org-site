services:
  esbuild:
    image: node:22-alpine
    init: true
    volumes:
      - .:/site
      - /site/node_modules
    working_dir: /site
    tty: true
    stdin_open: true
    restart: always
    command: sh -c "npm install && npm run data && npm run test:links && npm run watch"

  jekyll:
    depends_on:
      - esbuild
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    volumes:
      - .:/site
    ports:
      - "4000:4000"
    command: sh -lc "bundle install && bundle exec jekyll serve --incremental --watch --host 0.0.0.0"

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    init: true
    volumes:
      - .:/site
      - /site/node_modules
    working_dir: /site
    command: sh -lc "npm ci && npx playwright test"
