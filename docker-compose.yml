services:
  esbuild:
    build:
      context: .
      dockerfile: _docker/esbuild/Dockerfile
    init: true
    environment:
      NODE_ENV: development
    volumes:
      - .:/site
      - esbuild_node_modules:/site/node_modules
      - jekyll_site:/site/_site
    working_dir: /site
    healthcheck:
      test: ["CMD-SHELL", "test -f /site/assets/.esbuild-ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  jekyll:
    depends_on:
      esbuild:
        condition: service_healthy
    build:
      context: .
      dockerfile: _docker/jekyll/Dockerfile
    init: true
    environment:
      JEKYLL_ENV: development
      POLLING: "--force_polling"
    volumes:
      - .:/site
      - jekyll_site:/site/_site
      - jekyll_cache:/site/.jekyll-cache
      - sass_cache:/site/.sass-cache
    ports:
      - "4000:4000"
    command: >
      sh -c "bundle exec jekyll serve --incremental --watch --host 0.0.0.0 $${POLLING} --config _config.yml,_config_dev.yml"

  playwright:
    build:
      context: .
      dockerfile: _docker/playwright/Dockerfile
    profiles:
      - test
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UI_BASE_URL: http://host.docker.internal:4000
    volumes:
      - .:/site
      - playwright_node_modules:/site/node_modules
      - jekyll_site:/site/_site
    working_dir: /site

volumes:
  esbuild_node_modules:
  playwright_node_modules:
  jekyll_cache:
  sass_cache:
  jekyll_site:
