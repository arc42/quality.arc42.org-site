<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Atkinson Hyperlegible Next','Atkinson Hyperlegible',-apple-system,'Segoe UI',sans-serif" role="img" aria-labelledby="pa-title pa-desc">
  <title id="pa-title">Plugin architecture</title>
  <desc id="pa-desc">A host core owns stable extension-point contracts and a plugin registry. Plugins implement the contracts and plug in from outside; a future plugin can be added without changing the core.</desc>

  <defs>
    <marker id="parr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="parr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- host core -->
  <rect x="80" y="80" width="330" height="340" rx="14" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
  <text x="245" y="120" font-size="17" fill="#682d63" font-weight="700" text-anchor="middle">Host core</text>
  <text x="245" y="142" font-size="11.5" fill="#666" text-anchor="middle">lean · stable · closed to modification</text>

  <!-- plugin registry inside the core -->
  <rect x="110" y="340" width="270" height="52" rx="8" fill="#f8f9fa" stroke="#682d63" stroke-width="1.8"/>
  <text x="245" y="362" font-size="12.5" fill="#682d63" font-weight="600" text-anchor="middle">Plugin registry</text>
  <text x="245" y="380" font-size="10.5" fill="#666" text-anchor="middle">discovery at startup or runtime</text>

  <!-- extension-point sockets on the core's right edge -->
  <g text-anchor="middle">
    <rect x="370" y="170" width="80" height="46" rx="6" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.2"/>
    <text x="410" y="190" font-size="11.5" fill="#2f6e5b" font-weight="700">extension</text>
    <text x="410" y="205" font-size="11.5" fill="#2f6e5b" font-weight="700">point A</text>

    <rect x="370" y="262" width="80" height="46" rx="6" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.2"/>
    <text x="410" y="282" font-size="11.5" fill="#2f6e5b" font-weight="700">extension</text>
    <text x="410" y="297" font-size="11.5" fill="#2f6e5b" font-weight="700">point B</text>
  </g>

  <!-- plugins -->
  <g text-anchor="middle">
    <rect x="610" y="110" width="230" height="56" rx="10" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="725" y="134" font-size="14" fill="#0077a3" font-weight="700">Plugin 1</text>
    <text x="725" y="152" font-size="10.5" fill="#666">implements contract A</text>

    <rect x="610" y="196" width="230" height="56" rx="10" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="725" y="220" font-size="14" fill="#0077a3" font-weight="700">Plugin 2</text>
    <text x="725" y="238" font-size="10.5" fill="#666">implements contract A</text>

    <rect x="610" y="282" width="230" height="56" rx="10" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="725" y="306" font-size="14" fill="#0077a3" font-weight="700">Plugin 3</text>
    <text x="725" y="324" font-size="10.5" fill="#666">implements contract B</text>

    <rect x="610" y="368" width="230" height="56" rx="10" fill="none" stroke="#aaa" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="725" y="392" font-size="14" fill="#999" font-weight="700">future plugin</text>
    <text x="725" y="410" font-size="10.5" fill="#aaa">added later — core unchanged</text>
  </g>

  <!-- plug-in connections -->
  <line x1="610" y1="142" x2="456" y2="186" stroke="#444" stroke-width="2" marker-end="url(#parr)"/>
  <line x1="610" y1="222" x2="456" y2="198" stroke="#444" stroke-width="2" marker-end="url(#parr)"/>
  <line x1="610" y1="310" x2="456" y2="288" stroke="#444" stroke-width="2" marker-end="url(#parr)"/>
  <line x1="610" y1="396" x2="456" y2="302" stroke="#aaa" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#parr-gray)"/>

  <text x="533" y="158" font-size="11.5" fill="#444" text-anchor="middle">register · implement</text>

  <text x="460" y="465" font-size="13" fill="#444" font-weight="600" text-anchor="middle">the contract is stable — plugins add, swap, or drop features, the core never changes</text>
  <text x="460" y="492" font-size="11.5" fill="#999" text-anchor="middle">isolation is a dial: in-process · classloader · subprocess · sandbox — safety up, latency up</text>
</svg>
