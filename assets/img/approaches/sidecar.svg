<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Atkinson Hyperlegible Next','Atkinson Hyperlegible',-apple-system,'Segoe UI',sans-serif" role="img" aria-labelledby="sc-title sc-desc">
  <title id="sc-title">Sidecar</title>
  <desc id="sc-desc">A sidecar process runs beside the application in the same scheduling unit, sharing network and storage. It intercepts inbound traffic before handing it to the application over localhost, handles outbound calls, and ships telemetry — the application stays unchanged.</desc>

  <defs>
    <marker id="sarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="sarr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e88a55"/>
    </marker>
  </defs>

  <!-- client above the scheduling unit -->
  <rect x="425" y="30" width="160" height="46" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
  <text x="505" y="58" font-size="14" fill="#0077a3" font-weight="700" text-anchor="middle">Client / peer</text>

  <!-- inbound traffic -->
  <line x1="505" y1="76" x2="505" y2="206" stroke="#444" stroke-width="2" marker-end="url(#sarr)"/>
  <text x="540" y="115" font-size="11.5" fill="#444">inbound</text>

  <!-- scheduling unit boundary -->
  <rect x="400" y="130" width="440" height="300" rx="14" fill="none" stroke="#888" stroke-width="1.8" stroke-dasharray="8 6"/>
  <text x="660" y="160" font-size="13" fill="#666" font-weight="600" text-anchor="middle">scheduling unit (pod · VM · host)</text>

  <!-- sidecar -->
  <rect x="430" y="210" width="150" height="110" rx="10" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
  <text x="505" y="245" font-size="15" fill="#682d63" font-weight="700" text-anchor="middle">Sidecar</text>
  <text x="505" y="267" font-size="11" fill="#666" text-anchor="middle">TLS · retries</text>
  <text x="505" y="283" font-size="11" fill="#666" text-anchor="middle">telemetry</text>

  <!-- localhost handoff -->
  <line x1="580" y1="265" x2="646" y2="265" stroke="#444" stroke-width="2" marker-end="url(#sarr)"/>
  <text x="613" y="252" font-size="10.5" fill="#999" text-anchor="middle">localhost</text>

  <!-- application -->
  <rect x="650" y="210" width="160" height="110" rx="10" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
  <text x="730" y="258" font-size="15" fill="#0077a3" font-weight="700" text-anchor="middle">Application</text>
  <text x="730" y="280" font-size="11" fill="#666" text-anchor="middle">unchanged</text>

  <!-- shared resources note -->
  <text x="620" y="405" font-size="11.5" fill="#888" text-anchor="middle">shared network namespace and volumes</text>

  <!-- telemetry backend, left of the unit -->
  <rect x="60" y="170" width="170" height="50" rx="8" fill="#fff5ef" stroke="#e88a55" stroke-width="2"/>
  <text x="145" y="200" font-size="13" fill="#b35e2e" font-weight="600" text-anchor="middle">Telemetry backend</text>
  <line x1="426" y1="240" x2="234" y2="198" stroke="#e88a55" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#sarr-orange)"/>
  <text x="330" y="205" font-size="11.5" fill="#b35e2e" text-anchor="middle">metrics · traces</text>

  <!-- downstream service, left of the unit -->
  <rect x="60" y="330" width="170" height="50" rx="8" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
  <text x="145" y="360" font-size="13" fill="#2f6e5b" font-weight="700" text-anchor="middle">Downstream service</text>
  <line x1="426" y1="290" x2="234" y2="350" stroke="#444" stroke-width="2" marker-end="url(#sarr)"/>
  <text x="320" y="307" font-size="11.5" fill="#444" text-anchor="middle">outbound via sidecar</text>

  <text x="460" y="478" font-size="13" fill="#444" font-weight="600" text-anchor="middle">the sidecar adds capabilities — the application code never changes</text>
  <text x="460" y="503" font-size="11.5" fill="#999" text-anchor="middle">shared fate: scale, schedule, die together · one sidecar image serves every stack · upgrades on its own cadence</text>
</svg>
