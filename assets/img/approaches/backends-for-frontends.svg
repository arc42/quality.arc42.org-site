<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Atkinson Hyperlegible Next','Atkinson Hyperlegible',-apple-system,'Segoe UI',sans-serif" role="img" aria-labelledby="bff-title bff-desc">
  <title id="bff-title">Backends for Frontends</title>
  <desc id="bff-desc">Each frontend — web, mobile, partner — calls its own dedicated BFF, owned by the same team; every BFF aggregates the shared, general-purpose downstream services and tailors the payload to its one experience.</desc>

  <defs>
    <marker id="barr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- ownership boundaries: one team owns frontend + BFF -->
  <g>
    <rect x="50" y="28" width="240" height="222" rx="12" fill="none" stroke="#5fb49c" stroke-width="1.8" stroke-dasharray="7 5"/>
    <rect x="340" y="28" width="240" height="222" rx="12" fill="none" stroke="#5fb49c" stroke-width="1.8" stroke-dasharray="7 5"/>
    <rect x="630" y="28" width="240" height="222" rx="12" fill="none" stroke="#5fb49c" stroke-width="1.8" stroke-dasharray="7 5"/>
    <text x="170" y="244" font-size="11.5" fill="#3d8a73" text-anchor="middle">web team</text>
    <text x="460" y="244" font-size="11.5" fill="#3d8a73" text-anchor="middle">mobile team</text>
    <text x="750" y="244" font-size="11.5" fill="#3d8a73" text-anchor="middle">partner team</text>
  </g>

  <!-- frontends -->
  <g text-anchor="middle">
    <rect x="70" y="44" width="200" height="44" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="170" y="71" font-size="14" fill="#0077a3" font-weight="700">Web App</text>

    <rect x="360" y="44" width="200" height="44" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="460" y="71" font-size="14" fill="#0077a3" font-weight="700">Mobile App</text>

    <rect x="650" y="44" width="200" height="44" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="750" y="71" font-size="14" fill="#0077a3" font-weight="700">Partner Integration</text>
  </g>

  <!-- frontend -> own BFF -->
  <line x1="170" y1="88" x2="170" y2="128" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="460" y1="88" x2="460" y2="128" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="750" y1="88" x2="750" y2="128" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>

  <!-- BFFs -->
  <g text-anchor="middle">
    <rect x="65" y="132" width="210" height="68" rx="10" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
    <text x="170" y="160" font-size="15" fill="#682d63" font-weight="700">Web BFF</text>
    <text x="170" y="180" font-size="11.5" fill="#666">aggregate · tailor payload</text>

    <rect x="355" y="132" width="210" height="68" rx="10" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
    <text x="460" y="160" font-size="15" fill="#682d63" font-weight="700">Mobile BFF</text>
    <text x="460" y="180" font-size="11.5" fill="#666">aggregate · tailor payload</text>

    <rect x="645" y="132" width="210" height="68" rx="10" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
    <text x="750" y="160" font-size="15" fill="#682d63" font-weight="700">Partner BFF</text>
    <text x="750" y="180" font-size="11.5" fill="#666">aggregate · tailor payload</text>
  </g>

  <!-- BFF -> downstream services (fan-out) -->
  <line x1="150" y1="200" x2="210" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="195" y1="200" x2="435" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="420" y1="200" x2="245" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="460" y1="200" x2="460" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="500" y1="200" x2="675" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="725" y1="200" x2="485" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>
  <line x1="770" y1="200" x2="710" y2="330" stroke="#444" stroke-width="2" marker-end="url(#barr)"/>

  <!-- downstream services -->
  <g text-anchor="middle">
    <rect x="130" y="334" width="180" height="76" rx="10" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
    <text x="220" y="365" font-size="15" fill="#2f6e5b" font-weight="700">Catalog</text>
    <text x="220" y="386" font-size="11" fill="#666">general-purpose API</text>

    <rect x="370" y="334" width="180" height="76" rx="10" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
    <text x="460" y="365" font-size="15" fill="#2f6e5b" font-weight="700">Orders</text>
    <text x="460" y="386" font-size="11" fill="#666">general-purpose API</text>

    <rect x="610" y="334" width="180" height="76" rx="10" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
    <text x="700" y="365" font-size="15" fill="#2f6e5b" font-weight="700">Accounts</text>
    <text x="700" y="386" font-size="11" fill="#666">general-purpose API</text>
  </g>

  <text x="460" y="450" font-size="13" fill="#444" text-anchor="middle" font-weight="600">downstream services stay general-purpose · business logic stays here</text>
  <text x="460" y="495" font-size="11.5" fill="#999" text-anchor="middle">one BFF per experience · owned by the frontend team · changes on the frontend's release cadence</text>
</svg>
