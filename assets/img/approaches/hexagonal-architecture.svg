<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Atkinson Hyperlegible Next','Atkinson Hyperlegible',-apple-system,'Segoe UI',sans-serif" role="img" aria-labelledby="hex-title hex-desc">
  <title id="hex-title">Hexagonal Architecture (Ports and Adapters)</title>
  <desc id="hex-desc">The domain core sits inside a hexagon and owns its ports. Driving adapters — web or API adapter and test harness — call the inbound port on the left; driven adapters — database and message broker — sit behind outbound ports on the right. All source-code dependencies point inward toward the core.</desc>

  <defs>
    <marker id="harr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="harro" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e88a55"/>
    </marker>
  </defs>

  <!-- column labels -->
  <text x="165" y="106" font-size="13" fill="#3d8a73" text-anchor="middle">driving adapters · call inbound ports</text>
  <text x="760" y="106" font-size="13" fill="#3d8a73" text-anchor="middle">driven adapters · behind outbound ports</text>

  <!-- hexagon: domain core -->
  <polygon points="460,95 581,165 581,305 460,375 339,305 339,165" fill="#fff" stroke="#682d63" stroke-width="2.5"/>
  <g text-anchor="middle">
    <text x="460" y="222" font-size="20" fill="#682d63" font-weight="700">Domain Core</text>
    <text x="460" y="248" font-size="13.5" fill="#666">entities · use cases</text>
    <text x="460" y="268" font-size="13.5" fill="#666">framework-free · owns the ports</text>
  </g>

  <!-- driving adapters -->
  <g text-anchor="middle">
    <rect x="70" y="140" width="190" height="56" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="165" y="173" font-size="14" fill="#0077a3" font-weight="700">Web / API Adapter</text>

    <rect x="70" y="260" width="190" height="56" rx="8" fill="#f8f9fa" stroke="#00b8f5" stroke-width="2.5"/>
    <text x="165" y="293" font-size="14" fill="#0077a3" font-weight="700">Test Harness</text>
  </g>

  <!-- inbound port on left edge -->
  <rect x="321" y="217" width="36" height="36" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
  <text x="339" y="239" font-size="11" fill="#2f6e5b" text-anchor="middle" font-weight="700">port</text>

  <!-- driving adapters -> inbound port -->
  <line x1="260" y1="172" x2="316" y2="226" stroke="#444" stroke-width="2" marker-end="url(#harr)"/>
  <line x1="260" y1="284" x2="316" y2="244" stroke="#444" stroke-width="2" marker-end="url(#harr)"/>

  <!-- outbound ports on right edge -->
  <rect x="563" y="172" width="36" height="36" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
  <text x="581" y="194" font-size="11" fill="#2f6e5b" text-anchor="middle" font-weight="700">port</text>
  <rect x="563" y="262" width="36" height="36" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
  <text x="581" y="284" font-size="11" fill="#2f6e5b" text-anchor="middle" font-weight="700">port</text>

  <!-- ports -> driven adapters (call direction) -->
  <line x1="603" y1="188" x2="656" y2="172" stroke="#444" stroke-width="2" marker-end="url(#harr)"/>
  <line x1="603" y1="282" x2="656" y2="290" stroke="#444" stroke-width="2" marker-end="url(#harr)"/>

  <!-- driven adapters -->
  <g text-anchor="middle">
    <rect x="660" y="140" width="200" height="56" rx="8" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
    <text x="760" y="164" font-size="14" fill="#2f6e5b" font-weight="700">Database Adapter</text>
    <text x="760" y="184" font-size="12.5" fill="#666">implements the port</text>

    <rect x="660" y="260" width="200" height="56" rx="8" fill="#eaf6f2" stroke="#5fb49c" stroke-width="2.5"/>
    <text x="760" y="284" font-size="14" fill="#2f6e5b" font-weight="700">Message Broker Adapter</text>
    <text x="760" y="304" font-size="12.5" fill="#666">implements the port</text>
  </g>

  <!-- dependency direction annotation -->
  <line x1="215" y1="430" x2="310" y2="430" stroke="#e88a55" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#harro)"/>
  <line x1="705" y1="430" x2="610" y2="430" stroke="#e88a55" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#harro)"/>
  <text x="460" y="434" font-size="13" fill="#b05a24" text-anchor="middle">source-code dependencies point inward</text>

  <text x="460" y="482" font-size="15" fill="#444" text-anchor="middle" font-weight="600">the core never names a technology — adapters implement the core's ports</text>
  <text x="460" y="506" font-size="13" fill="#999" text-anchor="middle">swap an adapter without touching the core · test the core without database, broker, or framework</text>
</svg>
